<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login — Lumière Studio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/main.css" />
</head>
<body class="admin-body">

  <div class="login-page">
    <div class="login-card">
      <div class="login-logo">Lumière</div>
      <div class="login-sub">Admin Portal</div>

      <div class="login-error" id="loginError"></div>

      <form class="login-form" id="loginForm">
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" required placeholder="admin@lumierestudio.in" autocomplete="email" />
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" required placeholder="••••••••" autocomplete="current-password" />
        </div>
        <button type="submit" class="btn-primary" id="loginBtn" style="width:100%;text-align:center">
          Sign In
        </button>
      </form>

      <p style="margin-top:2rem;text-align:center;font-size:0.8rem;color:var(--text-muted)">
        <a href="../index.html" style="color:var(--accent)">← Back to Website</a>
      </p>
    </div>
  </div>

  <script type="module">
    import { db } from '../js/firebase-config.js';
    import { signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";

    // Redirect if already logged in
    onAuthStateChanged(auth, (user) => {
      if (user) window.location.href = 'dashboard.html';
    });

    const form = document.getElementById('loginForm');
    const loginBtn = document.getElementById('loginBtn');
    const errorEl = document.getElementById('loginError');

    form?.addEventListener('submit', async (e) => {
      e.preventDefault();
      loginBtn.textContent = 'Signing in…';
      loginBtn.disabled = true;
      errorEl.style.display = 'none';

      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      try {
        await signInWithEmailAndPassword(auth, email, password);
        window.location.href = 'dashboard.html';
      } catch (err) {
        let msg = 'Invalid email or password.';
        if (err.code === 'auth/too-many-requests') msg = 'Too many failed attempts. Please try again later.';
        if (err.code === 'auth/network-request-failed') msg = 'Network error. Please check your connection.';
        if (err.code === 'auth/configuration-not-found') msg = 'Firebase not configured yet. Please update firebase-config.js with your project credentials.';
        
        errorEl.textContent = msg;
        errorEl.style.display = 'block';
        loginBtn.textContent = 'Sign In';
        loginBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
